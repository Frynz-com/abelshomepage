<!DOCTYPE html>
<html lang="de">
<head><meta charset="UTF-8" /><title>Netlify Form Definitions</title></head>
<body>
  <!-- Static form definitions so Netlify detects them at build time -->

  <form name="finanzierung" netlify netlify-honeypot="bot-field" hidden>
    <input name="bot-field" />
    <input name="name" />
    <input name="email" />
    <input name="phone" />
    <textarea name="message"></textarea>
    <input name="widerrufsbelehrung" type="checkbox" />
  </form>

  <form name="kontakt" netlify netlify-honeypot="bot-field" hidden>
    <input name="bot-field" />
    <input name="name" />
    <input name="email" />
    <input name="phone" />
    <input name="subject" />
    <textarea name="message"></textarea>
    <input name="widerrufsbelehrung" type="checkbox" />
  </form>

  <form name="tippgeber" netlify netlify-honeypot="bot-field" hidden>
    <input name="bot-field" />
    <input name="name" />
    <input name="email" />
    <input name="telefon" />
    <textarea name="details"></textarea>
    <input name="widerrufsbelehrung" type="checkbox" />
  </form>

  <form name="newsletter" netlify netlify-honeypot="bot-field" hidden>
    <input name="bot-field" />
    <input name="email" type="email" />
    <input name="widerrufsbelehrung" type="checkbox" />
  </form>

  <form name="kontakt-modal" netlify netlify-honeypot="bot-field" hidden>
    <input name="bot-field" />
    <input name="name" />
    <input name="email" />
    <input name="phone" />
    <textarea name="message"></textarea>
    <input name="widerrufsbelehrung" type="checkbox" />
  </form>

  <form name="kontakt-allgemein" netlify netlify-honeypot="bot-field" hidden>
    <input name="bot-field" />
    <input name="name" />
    <input name="email" />
    <input name="phone" />
    <input name="subject" />
    <textarea name="message"></textarea>
    <input name="widerrufsbelehrung" type="checkbox" />
  </form>
</body>
</html>
