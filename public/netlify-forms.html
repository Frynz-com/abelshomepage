<!DOCTYPE html>
<html lang="de">
<head><meta charset="UTF-8" /><title>Netlify Form Definitions</title></head>
<body>
  <!-- Static form definitions so Netlify detects them at build time -->

  <form name="financing_inquiry" netlify netlify-honeypot="bot-field" hidden>
    <input name="bot-field" />
    <input name="name" />
    <input name="email" />
    <input name="phone" />
    <textarea name="message"></textarea>
    <input name="widerrufsbelehrung" type="checkbox" />
  </form>

  <form name="contact_request" netlify netlify-honeypot="bot-field" hidden>
    <input name="bot-field" />
    <input name="name" />
    <input name="email" />
    <input name="phone" />
    <input name="interest" />
    <input name="subject" />
    <textarea name="message"></textarea>
    <input name="datenschutz" type="checkbox" />
    <input name="widerrufsbelehrung" type="checkbox" />
  </form>

  <form name="valuation_request" netlify netlify-honeypot="bot-field" hidden>
    <input name="bot-field" />
    <input name="name" />
    <input name="email" />
    <input name="phone" />
    <input name="interest" />
    <textarea name="message"></textarea>
    <input name="widerrufsbelehrung" type="checkbox" />
  </form>

  <form name="buyer_search_request" netlify netlify-honeypot="bot-field" hidden>
    <input name="bot-field" />
    <input name="name" />
    <input name="email" />
    <input name="phone" />
    <input name="interest" />
    <textarea name="message"></textarea>
    <input name="widerrufsbelehrung" type="checkbox" />
  </form>

  <form name="referral_request" netlify netlify-honeypot="bot-field" hidden>
    <input name="bot-field" />
    <input name="name" />
    <input name="email" />
    <input name="telefon" />
    <textarea name="details"></textarea>
    <input name="widerrufsbelehrung" type="checkbox" />
  </form>

  <form name="newsletter_subscription" netlify netlify-honeypot="bot-field" hidden>
    <input name="bot-field" />
    <input name="email" type="email" />
    <input name="newsletter_consent" type="checkbox" />
    <input name="widerrufsbelehrung" type="checkbox" />
    <input name="double_opt_in" />
  </form>
</body>
</html>
